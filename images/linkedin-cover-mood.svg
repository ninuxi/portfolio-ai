<svg xmlns="http://www.w3.org/2000/svg" width="1584" height="396" viewBox="0 0 1584 396" role="img" aria-labelledby="title desc">
  <title id="title">LinkedIn Cover - AI For Live | MOOD 2.0</title>
  <desc id="desc">Copertina professionale con tema dark, gradiente teal-cyan e grafica audio generativa per il progetto MOOD 2.0.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07131e"/>
      <stop offset="55%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#052b24"/>
    </linearGradient>

    <radialGradient id="glowA" cx="15%" cy="25%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowB" cx="82%" cy="78%" r="52%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.05"/>
      <stop offset="18%" stop-color="#22d3ee" stop-opacity="0.85"/>
      <stop offset="58%" stop-color="#34d399" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#84cc16" stop-opacity="0.35"/>
    </linearGradient>

    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="grid" x="0" y="0" width="26" height="26" patternUnits="userSpaceOnUse">
      <path d="M 26 0 L 0 0 0 26" fill="none" stroke="#94a3b8" stroke-opacity="0.10" stroke-width="0.6"/>
    </pattern>

    <clipPath id="safeZone">
      <rect x="0" y="0" width="1584" height="396" rx="0" ry="0"/>
    </clipPath>
  </defs>

  <g clip-path="url(#safeZone)">
    <rect width="1584" height="396" fill="url(#bgGrad)"/>
    <rect width="1584" height="396" fill="url(#grid)" opacity="0.35"/>
    <rect width="1584" height="396" fill="url(#glowA)"/>
    <rect width="1584" height="396" fill="url(#glowB)"/>

    <!-- Onde audio / dati -->
    <path d="M -20 288 C 88 220, 164 336, 278 270 C 398 198, 472 326, 586 258 C 704 187, 777 306, 892 244 C 1008 182, 1086 295, 1200 232 C 1312 173, 1396 278, 1604 202"
          fill="none" stroke="url(#lineGrad)" stroke-width="4" filter="url(#softGlow)"/>

    <path d="M -20 312 C 84 252, 171 340, 274 294 C 384 245, 469 335, 579 286 C 692 236, 778 322, 890 273 C 1004 225, 1088 312, 1200 262 C 1318 208, 1398 288, 1604 232"
          fill="none" stroke="#22d3ee" stroke-opacity="0.35" stroke-width="1.6"/>

    <path d="M -20 260 C 80 206, 168 285, 272 246 C 382 205, 470 285, 580 243 C 692 201, 781 278, 894 236 C 1008 194, 1094 268, 1207 228 C 1321 187, 1404 254, 1604 206"
          fill="none" stroke="#34d399" stroke-opacity="0.28" stroke-width="1.4"/>

    <!-- barre verticali stile equalizzatore -->
    <g opacity="0.45">
      <rect x="1022" y="210" width="6" height="72" rx="3" fill="#22d3ee"/>
      <rect x="1038" y="194" width="6" height="98" rx="3" fill="#34d399"/>
      <rect x="1054" y="224" width="6" height="62" rx="3" fill="#22d3ee"/>
      <rect x="1070" y="178" width="6" height="120" rx="3" fill="#84cc16"/>
      <rect x="1086" y="206" width="6" height="80" rx="3" fill="#34d399"/>
      <rect x="1102" y="188" width="6" height="104" rx="3" fill="#22d3ee"/>
      <rect x="1118" y="230" width="6" height="56" rx="3" fill="#34d399"/>
    </g>

    <!-- blocco testo sinistra (safe area per profilo) -->
    <g transform="translate(108,94)">
      <text x="0" y="58" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="62" font-weight="900">AI For Live</text>

      <g transform="translate(0,174)">
        <rect x="0" y="0" width="164" height="34" rx="17" fill="#0f766e" fill-opacity="0.25" stroke="#14b8a6" stroke-opacity="0.7"/>
        <text x="82" y="23" text-anchor="middle" fill="#99f6e4" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">AI</text>

        <rect x="178" y="0" width="176" height="34" rx="17" fill="#065f46" fill-opacity="0.25" stroke="#34d399" stroke-opacity="0.75"/>
        <text x="266" y="23" text-anchor="middle" fill="#a7f3d0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">spatial audio</text>

        <rect x="368" y="0" width="224" height="34" rx="17" fill="#14532d" fill-opacity="0.25" stroke="#84cc16" stroke-opacity="0.75"/>
        <text x="480" y="23" text-anchor="middle" fill="#d9f99d" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Interactive Installations</text>
      </g>
    </g>

    <!-- Accento angolare -->
    <path d="M 1486 0 L 1584 0 L 1584 86" fill="none" stroke="#22d3ee" stroke-opacity="0.5" stroke-width="2"/>
    <path d="M 0 322 L 0 396 L 126 396" fill="none" stroke="#34d399" stroke-opacity="0.35" stroke-width="2"/>
  </g>
</svg>
