    <script type="text/javascript">
        const host = window.location.hostname.toLowerCase();
        const isMoodHost = host === 'mood.aiforlive.com';

        if (isMoodHost) {
            // Render mood page content while keeping the URL at '/'.
            fetch('/mood.html', { cache: 'no-store' })
                .then((response) => {
                    if (!response.ok) {
                        throw new Error('Unable to load mood page');
                    }
                    return response.text();
                })
                .then((html) => {
                    document.open();
                    document.write(html);
                    document.close();
                })
                .catch(() => {
                    window.location.replace('/mood.html');
                });
        } else {
            const userLang = navigator.language || navigator.userLanguage;
            if (userLang.startsWith('it')) {
                window.location.replace('/it.html');
            } else {
                window.location.replace('/en.html');
            }
        }
    </script>
</head>
